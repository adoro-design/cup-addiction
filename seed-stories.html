/* ── 데이터 등록 실행 ── */
async function runSeed() {
  document.getElementById('btnSeed').disabled = true;
  setStatus('running', '등록 중...');
  log('\n▶ 데모 데이터 등록 시작...');

  try {
    // 현재 데이터 확인
    const snapshot = await db.ref('stories').once('value');
    if (snapshot.val()) {
      log('⚠️  기존 데이터가 있습니다. 덮어씁니다...');
    }

    // 스토리 개별 등록
    const keys = Object.keys(DEMO_STORIES);
    for (let i = 0; i < keys.length; i++) {
      const key = keys[i];
      await db.ref('stories/' + key).set(DEMO_STORIES[key]);
      log(`  ✅ [${i+1}/${keys.length}] ${DEMO_STORIES[key].title.substring(0, 20)}...`);
    }

    log('\n🎉 총 ' + keys.length + '건 등록 완료!');
    log('👉 success-stories.html 을 열어서 확인해보세요.');
    setStatus('done', '등록 완료 (' + keys.length + '건)');
  } catch (err) {
    log('\n❌ 오류 발생: ' + err.message);
    log('→ Firebase 보안 규칙에서 write 권한을 확인하세요.');
    setStatus('error', '오류 발생');
    document.getElementById('btnSeed').disabled = false;
  }
}

/* ── 전체 삭제 ── */
async function clearData() {
  if (!confirm('Firebase의 stories 데이터를 모두 삭제하시겠습니까?')) return;
  document.getElementById('btnClear').disabled = true;
  setStatus('running', '삭제 중...');
  log('\n▶ 데이터 삭제 시작...');

  try {
    await db.ref('stories').remove();
    log('✅ stories 데이터가 모두 삭제되었습니다.');
    setStatus('idle', '삭제 완료');
  } catch (err) {
    log('\n❌ 삭제 오류: ' + err.message);
    setStatus('error', '삭제 오류');
  }
  document.getElementById('btnClear').disabled = false;
}
</script>
